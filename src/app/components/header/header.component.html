<header class="main-header">
    <div class="header-left">
        <button class="sidebar-toggle" (click)="toggleSidebar()" id="sidebar-toggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="header-title">
            <h2>La plateforme intelligente de gestion scolaire</h2>
        </div>
    </div>
    <div class="header-actions">
        <button class="doc-link" routerLink="/fipix-docs" title="Documentation du Framework">
            <i class="bi bi-book"></i>
        </button>
        <button class="theme-toggle" (click)="toggleTheme()" [title]="(isDarkMode$ | async) ? 'Passer au mode clair' : 'Passer au mode sombre'">
            <i class="bi" [class.bi-moon-stars]="!(isDarkMode$ | async)" [class.bi-sun]="isDarkMode$ | async"></i>
        </button>
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" placeholder="chercher un agent ...">
        </div>
        <div class="user-info" [class.active]="isProfileActive" (click)="toggleProfile()">
            <div class="user-avatar">
                <img [src]="userAvatar" alt="User">
            </div>
            <span class="user-name">Ronnie Woodkin</span>
            <span class="chevron-down-small"></span>
            <div class="profile-dropdown" id="profile-menu" (click)="$event.stopPropagation()">
                <div class="profile-dropdown-header">
                    <div class="edit-photo">
                        <img [src]="userAvatar" alt="User Large" id="profile-img-large">
                        <input type="file" id="photo-upload" (change)="onPhotoUpload($event)" accept="image/*" style="display: none;">
                        <button class="btn-edit-photo" (click)="triggerPhotoUpload()">Modifier la photo</button>
                    </div>
                </div>
                <div class="profile-dropdown-body">
                    <div class="profile-info-item">
                        <span class="profile-info-label">Fonction</span>
                        <span class="profile-info-value">Administrateur Système</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">Grade</span>
                        <span class="profile-info-value">Directeur</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">Direction</span>
                        <span class="profile-info-value">DRH / Kinshasa</span>
                    </div>
                </div>
                <div class="profile-dropdown-footer">
                    <button class="btn-logout" routerLink="/login">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Se déconnecter
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
