<div class="page-container finances-page">
  <app-ecole-financial-dashboard *ngIf="activeTab === 'tableau-de-bord-financier'"></app-ecole-financial-dashboard>
  <app-ecole-currencies *ngIf="activeTab === 'devises'"></app-ecole-currencies>
  <app-ecole-exchange-rates *ngIf="activeTab === 'taux'"></app-ecole-exchange-rates>
  <app-ecole-fee-categories *ngIf="activeTab === 'categories-frais'"></app-ecole-fee-categories>
  <app-ecole-payment-installments *ngIf="activeTab === 'tranches-paiement'"></app-ecole-payment-installments>
  <app-ecole-school-fees *ngIf="activeTab === 'frais-scolaires'"></app-ecole-school-fees>
  <app-ecole-payments *ngIf="activeTab === 'paiements'"></app-ecole-payments>
  <app-ecole-financial-statements *ngIf="activeTab === 'etats-financiers'"></app-ecole-financial-statements>

  <section
    class="placeholder-panel"
    *ngIf="activeTab !== 'tableau-de-bord-financier' && activeTab !== 'devises' && activeTab !== 'taux' && activeTab !== 'categories-frais' && activeTab !== 'tranches-paiement' && activeTab !== 'frais-scolaires' && activeTab !== 'paiements' && activeTab !== 'etats-financiers'"
  >
    <div class="placeholder-card">
      <i class="bi bi-tools"></i>
      <h2>Fonctionnalite en cours de developpement</h2>
      <p>Cette section sera disponible prochainement.</p>
    </div>
  </section>
</div>
