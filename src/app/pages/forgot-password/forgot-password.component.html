<div class="auth-container">
  <div class="auth-wrapper">
    <!-- DRC Colors top bar -->
    <div class="drc-stripe">
      <div class="color-blue"></div>
      <div class="color-yellow"></div>
      <div class="color-red"></div>
    </div>
    
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon-container">
          <i class="bi bi-key-fill" *ngIf="!isSuccess"></i>
          <i class="bi bi-shield-check" *ngIf="isSuccess" style="color: #10b981;"></i>
        </div>
        <h2>Récupération de mot de passe</h2>
        <p *ngIf="!isSuccess">
          Saisissez votre identifiant pour recevoir un mot de passe temporaire.
        </p>
        <p *ngIf="isSuccess">
          <strong>Demande envoyée.</strong><br />
          Si l’identifiant <em>{{ username }}</em> est reconnu, un mot de passe temporaire vous sera communiqué.
        </p>
      </div>

      <div class="auth-form" *ngIf="!isSuccess">
        <form (ngSubmit)="onSubmit()" #recoveryForm="ngForm">
          <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="form-group">
            <label for="username">Identifiant</label>
            <div class="input-icon-wrapper">
              <i class="bi bi-person"></i>
              <input
                type="text"
                id="username"
                name="username"
                [(ngModel)]="username"
                required
                [disabled]="isSubmitting"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="auth-actions">
            <button
              type="submit"
              class="btn-primary"
              [disabled]="isSubmitting || !recoveryForm.valid"
            >
              <span *ngIf="!isSubmitting">Envoyer</span>
              <span *ngIf="isSubmitting" class="spinner"></span>
            </button>
          </div>
        </form>
      </div>
      
      <div class="resend-info">
        <a routerLink="/login" class="back-link"><i class="bi bi-arrow-left-short"></i> Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
