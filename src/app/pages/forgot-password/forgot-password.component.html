<div class="auth-container">
  <div class="auth-wrapper">
    <!-- DRC Colors top bar -->
    <div class="drc-stripe">
      <div class="color-blue"></div>
      <div class="color-yellow"></div>
      <div class="color-red"></div>
    </div>
    
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon-container">
          <i class="bi bi-key-fill" *ngIf="!isSuccess"></i>
          <i class="bi bi-shield-check" *ngIf="isSuccess" style="color: #10b981;"></i>
        </div>
        <h2>Récupération de mot de passe</h2>
        <p *ngIf="!isSuccess">Veuillez entrer l'adresse email associée à votre compte pour recevoir un mot de passe par défaut.</p>
        <p *ngIf="isSuccess">
          <strong>Processus initié.</strong><br/>
          Si l'adresse <em>{{email}}</em> est reconnue par nos services, un email contenant un mot de passe temporaire vient de vous être envoyé.
        </p>
      </div>

      <div class="auth-form" *ngIf="!isSuccess">
        <form (ngSubmit)="onSubmit()" #recoveryForm="ngForm">
          <div class="form-group">
            <label for="email">Adresse Email</label>
            <div class="input-icon-wrapper">
              <i class="bi bi-envelope"></i>
              <input 
                type="email" 
                id="email" 
                name="email" 
                [(ngModel)]="email" 
                required 
                email
                [disabled]="isSubmitting"
                placeholder="agent@fonctionpublique.cd"
              />
            </div>
          </div>

          <div class="auth-actions">
            <button 
              type="submit"
              class="btn-primary" 
              [disabled]="isSubmitting || !recoveryForm.valid" 
            >
              <span *ngIf="!isSubmitting">Envoyer le lien</span>
              <span *ngIf="isSubmitting" class="spinner"></span>
            </button>
          </div>
        </form>
      </div>
      
      <div class="resend-info">
        <a routerLink="/login" class="back-link"><i class="bi bi-arrow-left-short"></i> Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
