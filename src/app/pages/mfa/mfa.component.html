<div class="mfa-container">
  <div class="mfa-wrapper">
    <!-- DRC Colors top bar -->
    <div class="drc-stripe">
      <div class="color-blue"></div>
      <div class="color-yellow"></div>
      <div class="color-red"></div>
    </div>
    
    <div class="mfa-card">
      <div class="mfa-header">
        <div class="mfa-icon-container">
          <i class="bi bi-phone-vibrate-fill"></i>
        </div>
        <h2>Validation Authenticator</h2>
        <p>Ouvrez votre application <strong>Google Authenticator</strong> ou <strong>Microsoft Authenticator</strong> pour récupérer votre code de sécurité.</p>
      </div>

      <div class="mfa-form">
        <div class="digits-container">
          <input 
            *ngFor="let digit of mfaCode; let i = index; trackBy: trackByIndex" 
            #digitInput
            type="text" 
            maxlength="1"
            inputmode="numeric"
            [ngModel]="mfaCode[i]" 
            (ngModelChange)="onDigitInput($event, i)" 
            (keydown)="onKeyDown($event, i)"
            (paste)="onPaste($event)"
            [disabled]="isLoading"
            class="digit-input"
            autocomplete="one-time-code"
          />
        </div>

        <div class="mfa-actions">
          <button 
            class="btn-verify" 
            [disabled]="isLoading || mfaCode.join('').length !== 6" 
            (click)="verifyCode()"
          >
            <span *ngIf="!isLoading">Valider l'accès</span>
            <span *ngIf="isLoading" class="spinner"></span>
          </button>
        </div>

        <div class="resend-info">
          <p>Le code change toutes les 30 secondes. <button (click)="resendCode()" [disabled]="isLoading" class="link-btn">Besoin d'aide ?</button></p>
          <a routerLink="/login" class="back-link"><i class="bi bi-arrow-left-short"></i> Retour à la connexion</a>
        </div>
      </div>
    </div>
  </div>
</div>
