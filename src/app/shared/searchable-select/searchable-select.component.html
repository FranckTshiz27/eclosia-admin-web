<div class="searchable-select" [class.is-disabled]="disabled" [class.is-open]="isOpen">
  <input
    #queryInput
    type="text"
    [(ngModel)]="query"
    [ngModelOptions]="{ standalone: true }"
    [placeholder]="placeholder"
    [disabled]="disabled"
    autocomplete="off"
    (focus)="open()"
    (click)="onInputClick()"
    (input)="onQueryInput()"
    (blur)="onBlur()"
  />
  <button
    *ngIf="clearable && hasValue && !disabled"
    class="select-clear"
    type="button"
    (mousedown)="$event.preventDefault(); clear()"
    aria-label="Effacer"
  >
    <i class="bi bi-x"></i>
  </button>
  <button
    class="select-chevron"
    type="button"
    [disabled]="disabled"
    (mousedown)="toggleFromChevron($event)"
    [attr.aria-expanded]="isOpen"
    aria-label="Ouvrir la liste"
  >
    <i class="bi bi-chevron-down"></i>
  </button>

  <div class="select-dropdown" *ngIf="isOpen && !disabled">
    <button
      type="button"
      class="select-option"
      *ngFor="let option of filteredOptions"
      [class.is-disabled]="option.disabled"
      [disabled]="!!option.disabled"
      (mousedown)="$event.preventDefault(); selectOption(option)"
    >
      {{ option.label }}
    </button>
    <div class="select-empty" *ngIf="filteredOptions.length === 0">{{ emptyText }}</div>
  </div>
</div>
